<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  {/* Rounded square container card */}
  <rect width="48" height="48" rx="12" fill="white" />
  
  <defs>
    <linearGradient id="favicon-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#0ea5e9" />
      <stop offset="50%" stopColor="#3b82f6" />
      <stop offset="100%" stopColor="#8b5cf6" />
    </linearGradient>
  </defs>
  
  {/* Connected CX Path */}
  <path 
    d="M 38 32 L 24 16 A 8 8 0 0 0 24 32 L 38 16" 
    stroke="url(#favicon-gradient)" 
    strokeWidth="3.5" 
    strokeLinecap="round" 
    strokeLinejoin="round" 
  />
  
  {/* Joint Nodes */}
  <circle cx="24" cy="16" r="2" fill="white" stroke="url(#favicon-gradient)" strokeWidth="1.8" />
  <circle cx="24" cy="32" r="2" fill="white" stroke="url(#favicon-gradient)" strokeWidth="1.8" />
  
  {/* Outer Nodes */}
  <circle cx="38" cy="16" r="2" fill="white" stroke="url(#favicon-gradient)" strokeWidth="1.8" />
  <circle cx="38" cy="32" r="2" fill="white" stroke="url(#favicon-gradient)" strokeWidth="1.8" />
</svg>
